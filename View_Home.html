<!-- ==================== HOME VIEW ==================== -->
<div id="home-view" class="flex-1 flex flex-col items-center p-6 animate-fade-in bg-white/50 overflow-y-auto w-full h-full">
  <div class="max-w-5xl w-full text-center mb-10 mt-6 shrink-0">
     <img src="https://lh3.googleusercontent.com/d/1PKsD5DdSr5gzxpoh0mC-GVnBx5PAgp7Q" alt="USMP Logo" class="h-24 mx-auto mb-6">
     <h1 class="text-3xl md:text-4xl font-extrabold usmp-title mb-4 tracking-tight uppercase">Sistema de Monitoreo del Cumplimiento de los Estándares de Calidad USMP</h1>
     <p class="text-gray-500 text-lg">Seleccione el módulo al que desea acceder</p>
  </div>

  <div class="max-w-5xl w-full space-y-12 pb-16">
    
    <!-- ÁREA OPERATIVA -->
    <div class="animate-slide-up" style="animation-delay: 0.1s;">
      <h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-6 shadow-sm-bottom">Área Operativa</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <button onclick="loadModule('VIRTUAL')" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 card-hover text-left group relative overflow-hidden">
          <div class="w-12 h-12 rounded-xl bg-red-50 text-red-600 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform z-10 relative">
            <i class="fa-solid fa-laptop text-xl"></i>
          </div>
          <h2 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-red-700 transition-colors z-10 relative">Asignaturas Virtuales</h2>
          <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Monitoreo de criterios de calidad para cursos virtuales e híbridos.</p>
        </button>

        <button onclick="loadModule('PRESENCIAL')" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 card-hover text-left group relative overflow-hidden">
          <div class="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform z-10 relative">
             <i class="fa-solid fa-chalkboard-user text-xl"></i>
          </div>
          <h2 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-orange-700 transition-colors z-10 relative">Asignaturas Presenciales</h2>
          <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Monitoreo de sesiones en aula física.</p>
        </button>
        
        <button onclick="loadModule('ACOMPANAMIENTO')" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 card-hover text-left group relative overflow-hidden">
          <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform z-10 relative">
             <i class="fa-solid fa-user-graduate text-xl"></i>
          </div>
          <h2 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-blue-700 transition-colors z-10 relative">Acompañamiento Pedagógico</h2>
          <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Supervisión y mejora del desempeño docente en 31 días.</p>
        </button>

        <!-- Resultados Generales -->
        <button onclick="loadModule('RESULTADOS')" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 card-hover text-left group relative overflow-hidden border-b-4 border-b-green-500 md:col-span-2 lg:col-span-3">
          <div class="flex items-start gap-4 h-full">
              <div class="w-12 h-12 shrink-0 rounded-xl bg-green-50 text-green-600 flex items-center justify-center group-hover:scale-110 transition-transform z-10 relative">
                 <i class="fa-solid fa-square-poll-vertical text-xl"></i>
              </div>
              <div>
                  <h2 class="text-xl font-bold text-gray-800 mb-1 group-hover:text-green-700 transition-colors z-10 relative">Envío de Resultados Generales</h2>
                  <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Consolidación de puntajes LMS y Acompañamiento Pedagógico. Envío masivo de fichas (PDF).</p>
              </div>
          </div>
        </button>
      </div>
    </div>

    <!-- ÁREA DE GESTIÓN -->
    <div class="animate-slide-up" style="animation-delay: 0.2s;">
      <h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-6">Área de Gestión</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Asignación exclusivo para Jefatura -->
        <button id="card-asignacion" onclick="loadModule('ASIGNACION')" class="md:col-span-3 bg-gradient-to-r from-purple-50 to-white p-6 rounded-2xl shadow-sm border border-purple-100 card-hover text-left group relative overflow-hidden border-l-4 border-l-purple-500">
          <div class="flex items-center gap-4">
              <div class="w-12 h-12 shrink-0 rounded-full bg-purple-200/50 text-purple-700 flex items-center justify-center group-hover:scale-110 transition-transform z-10 relative">
                 <i class="fa-solid fa-user-gear text-xl"></i>
              </div>
              <div>
                  <h2 class="text-xl font-bold text-gray-800 mb-1 group-hover:text-purple-700 transition-colors z-10 relative">Asignación de carga a coordinadores</h2>
                  <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Exclusivo Jefatura: Asignar asignaturas a miembros del equipo de coordinación.</p>
              </div>
          </div>
        </button>
      </div>
    </div>

    <!-- ÁREA ESTRATÉGICA Y ANÁLISIS -->
    <div class="animate-slide-up" style="animation-delay: 0.3s;">
      <h3 class="text-xl font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-6">Área Estratégica y Análisis</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-80">
        
        <button disabled class="bg-gray-50 p-6 rounded-2xl border border-gray-200 border-dashed text-left relative overflow-hidden cursor-not-allowed">
          <div class="w-12 h-12 rounded-xl bg-gray-200 text-gray-500 flex items-center justify-center mb-4 z-10 relative">
            <i class="fa-solid fa-chart-line text-xl"></i>
          </div>
          <h2 class="text-lg font-bold text-gray-600 mb-2 z-10 relative">Análisis de Resultados de Docentes</h2>
          <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Próximamente: Informes detallados sobre el desempeño del personal docente.</p>
          <span class="absolute top-4 right-4 bg-gray-200 text-gray-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">En desarrollo</span>
        </button>

        <button disabled class="bg-gray-50 p-6 rounded-2xl border border-gray-200 border-dashed text-left relative overflow-hidden cursor-not-allowed">
          <div class="w-12 h-12 rounded-xl bg-gray-200 text-gray-500 flex items-center justify-center mb-4 z-10 relative">
             <i class="fa-solid fa-chart-pie text-xl"></i>
          </div>
          <h2 class="text-lg font-bold text-gray-600 mb-2 z-10 relative">Análisis de Resultados de Coordinadores</h2>
          <p class="text-sm text-gray-500 z-10 relative leading-relaxed">Próximamente: Métricas e indicadores de gestión del equipo de coordinación.</p>
           <span class="absolute top-4 right-4 bg-gray-200 text-gray-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">En desarrollo</span>
        </button>

      </div>
    </div>

  </div> <!-- End Container max-w-5xl -->
</div>
